apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: karakeep
  namespace: karakeep
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`keep.mizar.scalar.cloud`)
      priority: 10
      services:
        - name: web
          kind: Service
          namespace: karakeep
          port: http
  tls:
    secretName: karakeep-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: karakeep
  namespace: karakeep
spec:
  secretName: karakeep-tls
  dnsNames:
    - "keep.mizar.scalar.cloud"
  issuerRef:
    name: le-staging
    kind: ClusterIssuer
