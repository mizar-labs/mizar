apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tandoor
  namespace: tandoor
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`meals.mizar.scalar.cloud`)
      priority: 10
      services:
        - name: gunicorn
          kind: Service
          namespace: tandoor
          port: gunicorn
  tls:
    secretName: tandoor-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tandoor
  namespace: tandoor
spec:
  secretName: tandoor-tls
  dnsNames:
    - "meals.mizar.scalar.cloud"
  issuerRef:
    name: le-staging
    kind: ClusterIssuer
